server {
    listen 80;
    server_name vod.bdiaby.fr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name vod.bdiaby.fr;

    ssl_certificate /etc/letsencrypt/live/vod.bdiaby.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vod.bdiaby.fr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 55G;
        proxy_connect_timeout 75s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_request_buffering off;
        proxy_buffering off;
    }

    location /queues {
        proxy_pass http://backend:3000/queues;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
