version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vod-factory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vod_factory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vod-factory-network

  redis:
    image: redis:7-alpine
    container_name: vod-factory-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - vod-factory-network

volumes:
  postgres_data:
  redis_data:

networks:
  vod-factory-network:
    driver: bridge
